<svg xmlns="http://www.w3.org/2000/svg" width="720" height="500" viewBox="0 0 720 500" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="720" height="500" rx="16" fill="#ffffff" stroke="#e2e4e8"/>
  <text x="360" y="38" text-anchor="middle" font-size="15" font-weight="700" fill="#1d1d1d">Alpha Signature Hoodie</text>
  <line x1="0" y1="58" x2="720" y2="58" stroke="#eee"/>

  <!-- left column: media -->
  <rect x="30" y="84" width="320" height="320" rx="6" fill="#f2f3f5"/>
  <text x="190" y="248" text-anchor="middle" font-size="13" fill="#9aa0a6">Produktbild</text>

  <!-- right column: header + cta box (tablet add-to-cart lives here) -->
  <text x="384" y="120" font-size="20" font-weight="700" fill="#1d1d1d">Alpha Signature Hoodie</text>
  <text x="384" y="150" font-size="18" font-weight="700" fill="#1d1d1d">80,00 €</text>
  <text x="384" y="186" font-size="13" fill="#666">Größe auswählen</text>
  <text x="384" y="212" font-size="13" fill="#9aa0a6">Farbe auswählen</text>

  <!-- right-column CTA box with greyed coming-soon bar -->
  <rect x="384" y="240" width="306" height="96" rx="8" fill="#fafafa" stroke="#eee"/>
  <rect x="404" y="268" width="266" height="44" rx="5" fill="#FA5400" fill-opacity="0.6"/>
  <text x="537" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Verfügbar ab 24. Dezember 2026</text>

  <text x="360" y="460" text-anchor="middle" font-size="11" fill="#aab0b6">Tablet: Add-to-Cart in der rechten Spalte ersetzt · untere Leiste entfällt</text>
</svg>
