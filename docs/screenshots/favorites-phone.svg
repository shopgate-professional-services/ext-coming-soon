  <text x="100" y="282" font-size="13" font-weight="700" fill="#7a4a12">Verfügbar ab 24. Dezember 2026</text>
  <line x1="20" y1="306" x2="300" y2="306" stroke="#f0f0f0"/>

  <text x="160" y="560" text-anchor="middle" font-size="11" fill="#aab0b6">Add-to-Cart ausgeblendet · Hinweis angehängt</text>
