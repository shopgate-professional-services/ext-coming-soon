<svg xmlns="http://www.w3.org/2000/svg" width="320" height="600" viewBox="0 0 320 600" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="320" height="600" rx="18" fill="#ffffff" stroke="#e2e4e8"/>
  <!-- top bar -->
  <path d="M22 30 l-8 8 l8 8" fill="none" stroke="#222" stroke-width="2"/>
  <text x="160" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#1d1d1d">Alpha Signature Hoodie</text>
  <path d="M290 32 h12 l-2 12 h-8 z" fill="none" stroke="#222" stroke-width="1.6"/>
  <line x1="60" y1="64" x2="320" y2="64" stroke="#eee"/>
  <!-- product image -->
  <rect x="40" y="84" width="240" height="240" rx="6" fill="#f2f3f5"/>
  <text x="160" y="210" text-anchor="middle" font-size="13" fill="#9aa0a6">Produktbild</text>
  <!-- title + price -->
  <text x="24" y="372" font-size="19" font-weight="700" fill="#1d1d1d">Alpha Signature Hoodie</text>
  <text x="296" y="410" text-anchor="end" font-size="19" font-weight="700" fill="#1d1d1d">80,00 €</text>
  <line x1="0" y1="436" x2="320" y2="436" stroke="#eee"/>
  <text x="24" y="466" font-size="14" fill="#444">Größe auswählen</text>
  <line x1="0" y1="486" x2="320" y2="486" stroke="#eee"/>
  <text x="24" y="514" font-size="14" fill="#9aa0a6">Farbe auswählen</text>
  <!-- coming-soon bar (= add-to-cart bar, greyed) -->
  <rect x="0" y="540" width="320" height="60" fill="#ffffff"/>
  <line x1="0" y1="540" x2="320" y2="540" stroke="#e7e7e7"/>
  <rect x="12" y="550" width="296" height="40" rx="5" fill="#FA5400" fill-opacity="0.6"/>
  <text x="160" y="575" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Verfügbar ab 24. Dezember 2026</text>
</svg>
